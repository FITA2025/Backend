version: "3.9"

services:
  db:
    image: mysql:8
    container_name: fita_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - fita_data:/var/lib/mysql
      - ./initial_data.sql:/docker-entrypoint-initdb.d/initial_data.sql
    command: --default-authentication-plugin=mysql_native_password

  web:
    build: .
    container_name: fita_api
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_CONN}
    volumes:
      - .:/app
      - ./logs:/app/logs   # 로그 디렉토리 마운트

volumes:
  fita_data: